name: "El Detective (Consumidor IA)"

on:
  schedule:
    # Cada 5 minutos — maximo que permite GitHub Actions
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  analizar:
    name: Procesar cola con Groq/Llama3
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar El Detective
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: llama-3.3-70b-versatile
          # 50 items por run x cada 5min = 600 items/hora
          # Groq free: 30 req/min, 6000 tokens/min — rate limiter interno maneja el throttle
          MAX_ITEMS_PER_RUN: "50"
          CONFIDENCE_THRESHOLD_ANOMALY: "0.60"
          LOG_LEVEL: INFO
        run: python -m scripts.detective.main

      - name: Resumen detective
        if: always()
        run: echo "Detective completado a las $(date)"
