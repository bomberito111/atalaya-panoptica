name: "El Rastreador (Productor)"

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  rastrear:
    name: Rastrear fuentes y poblar cola
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar rastreador - Fuentes Estatales
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          LOG_LEVEL: INFO
        run: |
          echo "=== Mercado Publico ==="
          python -m scripts.rastreador.fuentes_estatales.mercado_publico || true

          echo "=== Contraloria ==="
          python -m scripts.rastreador.fuentes_estatales.contraloria || true

          echo "=== Registro de Lobby ==="
          python -m scripts.rastreador.fuentes_estatales.lobby || true

          echo "=== SERVEL ==="
          python -m scripts.rastreador.fuentes_estatales.servel || true

          echo "=== DIPRES ==="
          python -m scripts.rastreador.fuentes_estatales.dipres || true

          echo "=== Transparencia ==="
          python -m scripts.rastreador.fuentes_estatales.transparencia || true

          echo "=== SINIM ==="
          python -m scripts.rastreador.fuentes_estatales.sinim || true

          echo "=== Medios Investigados ==="
          python -m scripts.rastreador.fuentes_estatales.medios_investigados || true

      - name: Ejecutar rastreador - Fuentes Web y RRSS
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          LOG_LEVEL: INFO
        run: |
          echo "=== Medios de Prensa RSS ==="
          python -m scripts.rastreador.fuentes_web.medios_prensa || true

          echo "=== Busqueda Web DuckDuckGo + Reddit Chile ==="
          python -m scripts.rastreador.fuentes_web.busqueda_web || true

          echo "=== Twitter/X via Nitter ==="
          python -m scripts.rastreador.fuentes_web.twitter_x || true

          echo "=== Facebook/Instagram ==="
          python -m scripts.rastreador.fuentes_web.facebook_ig || true

      - name: Resumen de ejecucion
        run: |
          echo "Rastreador completado a las $(date)"
          echo "Items disponibles en investigation_queue con status=pending"
